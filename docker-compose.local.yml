# Local dev setup — game server + MySQL
# Usage: docker compose -f docker-compose.local.yml up --build
services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: cosmic
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptestpass"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.local
    ports:
      - "8484:8484"
      - "7575:7575"
      - "7576:7576"
      - "7577:7577"
    environment:
      DB_PASS: testpass
      DB_HOST: db
      GAME_HOST: 127.0.0.1
    volumes:
      # Mount local WZ files (includes our custom items)
      - ./server/wz:/opt/server/wz
      - ./server/scripts:/opt/server/scripts
    depends_on:
      db:
        condition: service_healthy

  # Dashboard rodando no Docker (Linux) para evitar build nativo do canvas no Windows
  dashboard:
    image: node:22-bookworm
    working_dir: /app
    command: >
      sh -c "apt-get update -qq &&
             apt-get install -y -qq python3 build-essential pkg-config libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev > /tmp/apt.log 2>&1 &&
             npm install &&
             npm run dev -- -H 0.0.0.0 -p 3000"
    ports:
      - "3000:3000"
    env_file:
      - ./dashboard/.env.docker
    environment:
      WATCHPACK_POLLING: "true"
      # Aponta o dashboard pro servidor de jogo LOCAL. Sem isto o default e o host
      # interno do Fly.io (elin-ms-game.internal), inalcancavel no local — entao
      # mudancas de rate/drop/announce e o check de status nao chegam no servidor.
      GAME_API_URL: "http://server:8585"
      GAME_SERVER_HOST: "server"
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
      - ./server:/cosmic
    depends_on:
      db:
        condition: service_healthy

volumes:
  dashboard_node_modules:
